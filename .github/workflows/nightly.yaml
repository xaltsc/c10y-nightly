name: Nightly builds

on:
  schedule:
    - cron: '23 1 * * *'
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write

concurrency:
  group: nightly-reset
  cancel-in-progress: true

jobs:
  update-flake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
      - name: Update flake.lock
        uses: ./.github/actions/flake-update
        with:
          inputs: "nixpkgs c10y"

  build-rocksdb:
    needs: update-flake
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
      - uses: ./.github/actions/build+cache
        with:
          cachix-token: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          package: rocksdb

  build:
    needs: build-rocksdb
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-latest, ubuntu-24.04-arm]
        package:
          - default
          - max-perf
          - max-perf-haswell
        suffix:
          - ""
          - "-static-aarch64"
          - "-static-x86_64"
    uses: ./.github/workflows/build-package-nightly.yaml
    secrets:
      cachix-token: '${{ secrets.CACHIX_AUTH_TOKEN }}'
    with:
      runner: ${{ matrix.runner }}
      package: "${{ matrix.package }}${{ matrix.suffix }}"
      tag: ${{ matrix.runner == 'ubuntu-latest' && matrix.package == 'default' && matrix.suffix == '' }}
